<article class="prestamo-item">
	<div class="prestamo-item__left">
		<h3>{{ loan.activo }}</h3>
		<p class="prestamo-item__subtitle">Usuario: {{ loan.usuarioNombre }}</p>

		<div class="prestamo-item__dates">
			<div class="prestamo-item__date-col">
				<span class="prestamo-item__date-label">PRESTADO</span>
				<span class="prestamo-item__date-value">{{ loan.fechaPrestamo | date:'dd/MM/yyyy' }}</span>
			</div>

			@if (mostrarFechaDevolucion) {
				<div class="prestamo-item__date-col">
					<span class="prestamo-item__date-label">DEVOLUCIÓN</span>
					<span class="prestamo-item__date-value">
						{{ loan.fechaDevolucion ? (loan.fechaDevolucion | date:'dd/MM/yyyy') : 'Pendiente' }}
					</span>
				</div>
			}
		</div>
	</div>

	@if (mostrarBotonDevolver) {
		<div class="prestamo-item__right">
			<app-devolver-button (devolverClick)="abrirModal()"></app-devolver-button>
		</div>
	}
</article>

<app-return-modal
	[abierto]="modalAbierto"
	(cerrar)="cerrarModal()"
	(confirmar)="confirmarDevolucion($event)">
</app-return-modal>
