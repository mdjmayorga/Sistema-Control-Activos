<app-page-layout [title]="title" [description]="description">
  @if (loading) {
    <p class="status-message">Cargando prestamos...</p>
  }

  @if (!loading) {
    <app-prestamos-list
      [loans]="loans"
      [showReturnButton]="true"
      (returnLoan)="onReturnLoan($event)">
    </app-prestamos-list>
  }
</app-page-layout>
