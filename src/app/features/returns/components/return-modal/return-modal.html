@if (open) {
	<div class="devolucion-modal__backdrop" (click)="onClose()"></div>

	<section class="devolucion-modal" role="dialog" aria-modal="true" aria-labelledby="devolucion-modal-title">
		<h2 id="devolucion-modal-title">Confirmar devolucion</h2>
		<p>Esta seguro de registrar la devolucion de este prestamo?</p>

		<label class="devolucion-modal__checkbox" for="isDamaged">
			<input
				id="isDamaged"
				type="checkbox"
				[checked]="isDamaged"
				(change)="onDamagedChange($event)">
			<span>El producto esta dañado</span>
		</label>
		<p class="devolucion-modal__estado">Estado: {{ isDamaged ? 'Dañado' : 'No dañado' }}</p>

		@if (isDamaged) {
			<p class="devolucion-modal__whatsapp-msg">
				Se le enviara un mensaje por WhatsApp para continuar con el proceso.
			</p>
		}

		<div class="devolucion-modal__actions">
			<button type="button" class="devolucion-modal__btn devolucion-modal__btn--ghost" (click)="onClose()">
				Cancelar
			</button>
			<button type="button" class="devolucion-modal__btn devolucion-modal__btn--confirm" (click)="onConfirm()">
				Confirmar devolucion
			</button>
		</div>
	</section>
}
