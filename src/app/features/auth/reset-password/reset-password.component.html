<div class="auth-page">
  <div class="page-title">
    <h1 class="site-title">Bodega de<br>Topografía (ICO)</h1>
  </div>
  <div class="auth-card">
    <div class="card-header">
      <h1 class="card-title">Restablecer contraseña</h1>
      <p class="card-subtitle">Sistema de Control de Activos - CIVCO</p>
    </div>

    <p class="description">Ingresa tu correo institucional y te enviaremos una nueva contraseña.</p>

    <div class="form-group">
      <label for="resetEmail" class="form-label">Correo institucional</label>
      <input
        id="resetEmail"
        type="email"
        class="form-input"
        [value]="resetEmail()"
        (input)="resetEmail.set($any($event.target).value)"
        placeholder="usuario@estudiantec.cr"
      />
    </div>

    @if (resetError()) {
      <div class="alert alert-error" role="alert">
        <svg class="alert-icon" viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z"
            clip-rule="evenodd"
          />
        </svg>
        <span>{{ resetError() }}</span>
      </div>
    }

    @if (resetSuccess()) {
      <div class="alert alert-success" role="alert">
        <svg class="alert-icon" viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"
            clip-rule="evenodd"
          />
        </svg>
        <span>{{ resetSuccess() }}</span>
      </div>
    }

    <button
      type="button"
      class="btn-submit"
      [disabled]="resetLoading()"
      (click)="submitPasswordReset()"
    >
      @if (resetLoading()) {
        <span class="spinner"></span>
        Enviando...
      } @else {
        Enviar nueva contraseña
      }
    </button>

    <p class="card-footer">
      <a routerLink="/login" class="link">Volver a iniciar sesion</a>
    </p>
  </div>
</div>
