<article class="prestamo-item">
	<div class="prestamo-item__left">
		<h3>{{ prestamo.nombre_articulo }}</h3>
		<p>Usuario: {{ prestamo.nombre_persona }}</p>
	</div>

	<div class="prestamo-item__right">
		<p>Fecha del préstamo: {{ prestamo.fecha_prestamos | date:'dd/MM/yyyy' }}</p>
		<p>
			Fecha de devolución:
			{{ prestamo.fecha_devolucion ? (prestamo.fecha_devolucion | date:'dd/MM/yyyy') : 'Pendiente' }}
		</p>
	</div>
</article>
