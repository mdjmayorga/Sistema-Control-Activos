<div class="content-area">
  <div class="dashboard-header">
    <h1>Prestamos activos</h1>
  </div>

  <div class="page-body">
    <p class="page-description">
      Consulte los prestamos actualmente registrados en el sistema
    </p>

    <div class="loans-list">
      <p class="status-message" *ngIf="cargando">
        Cargando préstamos activos...
      </p>

      <p class="status-message" *ngIf="!cargando && prestamosActivos.length === 0">
        No hay préstamos activos registrados.
      </p>

      <div class="loan-item" *ngFor="let prestamo of prestamosActivos">
        <div class="loan-left">
          <h3>{{ prestamo.activo }}</h3>
          <p>Usuario: {{ prestamo.usuarioNombre }}</p>
        </div>

        <div class="loan-right">
          <p>Fecha del préstamo: {{ prestamo.fechaPrestamo | date:'dd/MM/yyyy' }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
