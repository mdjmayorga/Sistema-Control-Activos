<div class="layout">
  <app-user-navigation></app-user-navigation>

  <div class="content-area">
    <div class="loan-header">
      <h1>Solicitar Prestamo</h1>
    </div>

    <div class="loan-form-wrapper">
      <form class="form-panel" [formGroup]="loanForm" (ngSubmit)="onSubmit()">
        <div class="row two-cols">
          <div class="field">
            <label>GRUPO DE TOPOGRAFÍA</label>
            <select formControlName="grupoTopografia">
              <option value="">seleccione</option>
              <option value="Grupo de Topografia">Grupo de Topografía</option>
              <option value="Grupo de Taller">Grupo de Taller</option>
              <option value="Grupo de Proyecto">Grupo de Proyecto</option>
            </select>

            <small
              class="error"
              *ngIf="loanForm.get('grupoTopografia')?.invalid && loanForm.get('grupoTopografia')?.touched"
            >
              Este campo es obligatorio
            </small>
          </div>

          <div class="field">
            <label>CUADRILLA</label>
            <select formControlName="cuadrilla">
              <option value="">seleccione</option>
              <option value="Cuadrilla 1">Cuadrilla 1</option>
              <option value="Cuadrilla 2">Cuadrilla 2</option>
              <option value="Cuadrilla 3">Cuadrilla 3</option>
              <option value="Cuadrilla 4">Cuadrilla 4</option>
              <option value="Cuadrilla 5">Cuadrilla 5</option>
              <option value="Cuadrilla 6">Cuadrilla 6</option>
              <option value="Cuadrilla 7">Cuadrilla 7</option>
              <option value="Cuadrilla 8">Cuadrilla 8</option>
              <option value="Cuadrilla 9">Cuadrilla 9</option>
              <option value="Cuadrilla 10">Cuadrilla 10</option>
              <option value="Ninguna">Ninguna</option>
            </select>

            <small
              class="error"
              *ngIf="loanForm.get('cuadrilla')?.invalid && loanForm.get('cuadrilla')?.touched"
            >
              Este campo es obligatorio
            </small>
          </div>
        </div>

        <div class="field">
          <label>RAZON DEL PRÉSTAMO</label>
          <select formControlName="razonPrestamo">
            <option value="">seleccione</option>
            <option value="Docencia">Docencia</option>
            <option value="Curso">Curso</option>
            <option value="TFG">TFG</option>
          </select>

          <small
            class="error"
            *ngIf="loanForm.get('razonPrestamo')?.invalid && loanForm.get('razonPrestamo')?.touched"
          >
            Este campo es obligatorio
          </small>
        </div>

        <div class="divider"></div>

        <div class="field">
          <label>ACTIVO</label>
          <select formControlName="activo">
            <option value="">seleccione</option>
            <option value="Tripode de Aluminio">Trípode de Aluminio</option>
            <option value="Nivel Automatico">Nivel Automático</option>
            <option value="Estaciones Totales">Estaciones Totales(Sokkia)</option>
            <option value="Estacion">Estadias</option>
            <option value="Baston de Prisma">Bastón de Prisma</option>
            <option value="Prisma">Prisma</option>
            <option value="Tripode">Trípode</option>
            <option value="Cinta metrica de topografia">Cinta métrica de topografía</option>
            <option value="Odometro">Odómetro</option>
            <option value="Aplica">Aplica</option>
          </select>

          <small
            class="error"
            *ngIf="loanForm.get('activo')?.invalid && loanForm.get('activo')?.touched"
          >
            Este campo es obligatorio
          </small>
        </div>

        <div class="field">
          <label>
            NÚMERO DE SERIE
            <span class="optional">Opcional</span>
          </label>

          <input
            type="text"
            formControlName="numeroSerie"
            placeholder="Ejemplo: SRV-2021008-01"
          />

          <small
            class="error"
            *ngIf="loanForm.get('numeroSerie')?.invalid && loanForm.get('numeroSerie')?.touched"
          >
            El formato del número de serie no es válido
          </small>

          <small class="help-text">
            Si el activo no trae su respectivo número de serie omitirlo
          </small>
        </div>

        <div class="actions">
          <button class="btn btn-rose" type="submit">Confirmar prestamo</button>
          <button class="btn btn-blue" type="button" (click)="onCancel()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
