<div class="sidebar">
  <div class="profile">
    <div class="avatar"></div>
    <span class="username">{{ userName }}</span>
  </div>

  <div class="divider"></div>

  <nav class="menu" *ngIf="userRole === 'usuario'">
    <a class="menu-button" routerLink="/usuario/solicitar-prestamo" routerLinkActive="active">
      Solicitar Prestamo
    </a>

    <a class="menu-link" routerLink="/usuario/mis-prestamos" routerLinkActive="active">
      <span class="menu-icon">☷</span>
      <span>Mis prestamos</span>
    </a>

    <a class="menu-link" routerLink="/usuario/historial" routerLinkActive="active">
      <span class="menu-icon">↺</span>
      <span>Historial</span>
    </a>
  </nav>

  <nav class="menu" *ngIf="userRole === 'admin'">
    <a class="menu-button" routerLink="/admin/prestamos-activos" routerLinkActive="active">
      Prestamos activos
    </a>

    <a class="menu-link" routerLink="/admin/historial" routerLinkActive="active">
      <span class="menu-icon">↺</span>
      <span>Historial</span>
    </a>
  </nav>

  <div class="settings" *ngIf="userRole === 'usuario'" routerLink="/usuario/configuraciones">
    <span class="settings-icon">⚙</span>
    <span>Configuraciones</span>
  </div>

  <div class="settings" *ngIf="userRole === 'admin'" routerLink="/admin/configuraciones">
    <span class="settings-icon">⚙</span>
    <span>Configuraciones</span>
  </div>
</div>
