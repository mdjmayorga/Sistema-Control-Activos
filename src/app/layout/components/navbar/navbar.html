<aside class="sidebar" [class.is-collapsed]="collapsed()">
  <div class="sidebar__top">
    <div class="sidebar__profile">
      <span class="avatar"></span>
      <span class="username">{{ username() }}</span>
    </div>

    <button
      class="sidebar__toggle"
      type="button"
      (click)="toggleRequested.emit()"
      [attr.aria-label]="collapsed() ? 'Expandir navbar' : 'Ocultar navbar'"
    >
      {{ collapsed() ? '>' : '<' }}
    </button>
  </div>

  <a
    class="sidebar__action"
    [routerLink]="isAdmin() ? '/admin/solicitar-prestamo' : '/usuario/solicitar-prestamo'"
    aria-label="Solicitar Prestamo"
  >
    <span class="action-label action-label--full">Solicitar Prestamo</span>
    <span class="action-label action-label--short">+</span>
  </a>

  <nav class="sidebar__nav">
    <a [routerLink]="isAdmin() ? '/admin/mis-prestamos' : '/usuario/mis-prestamos'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Mis prestamos">
      <span class="nav-content nav-label--full">
        <img class="nav-icon" src="/prestamos-icon.png" alt="" aria-hidden="true" />
        <span class="nav-label">Mis prestamos</span>
      </span>
      <span class="nav-icon-only" aria-hidden="true"> 
        <img class="nav-icon" src="/prestamos-icon.png" alt="" />
      </span>
      <span class="nav-label nav-label--short">M</span>
    </a>
    <a [routerLink]="isAdmin() ? '/admin/mi-historial' : '/usuario/mi-historial'" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Mi historial">
      <span class="nav-content nav-label--full">
        <img class="nav-icon nav-icon--historial" src="/historial-icon.png" alt="" aria-hidden="true" />
        <span class="nav-label">Mi historial</span>
      </span>
      <span class="nav-icon-only" aria-hidden="true">
        <img class="nav-icon nav-icon--historial" src="/historial-icon.png" alt="" />
      </span>
      <span class="nav-label nav-label--short">MH</span>
    </a>

    @if (isAdmin()) {
      <div class="sidebar__divider" role="separator" aria-hidden="true"></div>

      <a routerLink="admin/prestamos-activos" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Prestamos">
        <span class="nav-content nav-label--full">
          <img class="nav-icon" src="/prestamos-icon.png" alt="" aria-hidden="true" />
          <span class="nav-label">Prestamos</span>
        </span>
        <span class="nav-icon-only" aria-hidden="true">
          <img class="nav-icon" src="/prestamos-icon.png" alt="" />
        </span>
        <span class="nav-label nav-label--short">P</span>
      </a>
      <a routerLink="/admin/historial" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Historial">
        <span class="nav-content nav-label--full">
          <img class="nav-icon nav-icon--historial" src="/historial-icon.png" alt="" aria-hidden="true" />
          <span class="nav-label">Historial</span>
        </span>
        <span class="nav-icon-only" aria-hidden="true">
          <img class="nav-icon nav-icon--historial" src="/historial-icon.png" alt="" />
        </span>
        <span class="nav-label nav-label--short">H</span>
      </a>
    }
  </nav>

  <a
    class="sidebar__settings"
    [routerLink]="isAdmin() ? '/admin/configuraciones' : '/usuario/configuraciones'"
    routerLinkActive="active"
    aria-label="Configuraciones"
  >
    <span class="nav-content nav-label--full">
      <img class="nav-icon" src="/configuraciones-icon.png" alt="" aria-hidden="true" />
      <span class="nav-label">Configuraciones</span>
    </span>
    <span class="nav-icon-only" aria-hidden="true">
      <img class="nav-icon" src="/configuraciones-icon.png" alt="" />
    </span>
    <span class="nav-label nav-label--short">C</span>
  </a>
</aside>
