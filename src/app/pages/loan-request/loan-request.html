<div class="page">
    
  <div class="wrapper">
    <nav class="topbar">
      <a class="active">Solicitar prestamo</a>
      <a href="#">Devolucion</a>
      <a href="#">Historial</a>
    </nav>

    <section class="header">
      <h1>Formulario de Topografia</h1>
      <p>
        Para realizar el prestamo del activo, primero debe verificarse presencialmente
        en bodega la disponibilidad del equipo solicitado
      </p>
    </section>

    <section class="form-panel">
      <div class="row two-cols">
        <div class="field">
          <label>GRUPO DE TOPOGRAFÍA</label>
          <select>
            <option>seleccione</option>
            <option>Grupo 01</option>
            <option>Grupo 02</option>
            <option>Grupo 03</option>
            <option>Grupo 04</option>
          </select>
        </div>

        <div class="field">
          <label>CUADRILLA</label>
          <select>
            <option>seleccione</option>
            <option>Cuadrilla 1</option>
            <option>Cuadrilla 2</option>
            <option>Cuadrilla 3</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>RAZÓN DEL PRÉSTAMO</label>
        <select>
          <option>seleccione</option>
          <option>Docencia</option>
          <option>Curso</option>
          <option>TFG</option>
        </select>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>ACTIVO</label>
        <select>
          <option>seleccione</option>
          <option>Tripode de Aluminio</option>
          <option>Nivel automatico</option>
          <option>Estacion total</option>
        </select>
      </div>

      <div class="field">
        <label>
          NÚMERO DE SERIE
          <span class="optional">Opcional</span>
        </label>
        <input type="text" placeholder="Ejemplo: SRV-2021008-01" />
        <small>Si el activo no trae su respectivo número de serie omitirlo</small>
      </div>
    </section>

    <div class="actions">
      <button class="btn btn-rose">Confirmar prestamo</button>
      <button class="btn btn-blue">Cancelar</button>
    </div>
  </div>
</div>
